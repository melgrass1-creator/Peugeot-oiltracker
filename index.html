<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Peugeot — 油耗儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeede8;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --success-bg: #eaf3de; --success-text: #27500a;
    --warn-bg: #faeeda;    --warn-text: #633806;
    --danger-bg: #fcebeb;  --danger-text: #791f1f;
    --accent: #1D9E75; --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg2: #272725; --bg3: #313130;
      --text: #e8e6df; --text2: #9c9a92; --text3: #6b6963;
      --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20);
      --success-bg: #173404; --success-text: #c0dd97;
      --warn-bg: #412402;    --warn-text: #fac775;
      --danger-bg: #501313;  --danger-text: #f09595;
      --accent: #5DCAA5;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 12px; height: 52px; position: sticky; top: 0; z-index: 10; }
  .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 16px; height: 16px; fill: #fff; }
  header h1 { font-size: 15px; font-weight: 500; }
  header span { font-size: 12px; color: var(--text3); margin-left: auto; }
  .container { max-width: 900px; margin: 0 auto; padding: 1.25rem 1rem 3rem; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1.1rem; }
  .filter-bar label { font-size: 12px; color: var(--text2); }
  .filter-bar select { font-size: 12px; padding: 5px 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  @media (max-width: 600px) { .metrics { grid-template-columns: 1fr 1fr; } }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: .85rem 1rem; }
  .metric .lbl { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .metric .val { font-size: 22px; font-weight: 500; line-height: 1.1; }
  .metric .unit { font-size: 11px; color: var(--text3); }
  .tab-bar { display: flex; gap: 4px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 5px 16px; border-radius: var(--radius); font-size: 12px; border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; color: var(--text2); transition: background .15s; }
  .tab:hover { background: var(--bg2); }
  .tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 580px) { .chart-row { grid-template-columns: 1fr; } }
  .chart-box { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1rem; }
  .chart-title { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .form-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1rem; }
  .form-card h3 { font-size: 13px; font-weight: 500; margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text2); }
  .field input { font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); width: 100%; transition: border-color .15s; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .computed-row { display: none; gap: 20px; margin-bottom: 12px; align-items: center; background: var(--bg2); border-radius: var(--radius); padding: 8px 14px; flex-wrap: wrap; }
  .computed-item .cl { font-size: 11px; color: var(--text2); }
  .computed-item .cv { font-size: 14px; font-weight: 500; }
  .btn-primary { font-size: 13px; padding: 8px 22px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; transition: background .15s; }
  .btn-primary:hover { background: var(--bg2); }
  .btn-del { font-size: 11px; padding: 3px 8px; border-radius: var(--radius); border: 0.5px solid var(--danger-text); background: transparent; color: var(--danger-text); cursor: pointer; }
  .tbl-wrap { overflow-x: auto; max-height: 420px; overflow-y: auto; }
  table { width: 100%; font-size: 12px; border-collapse: collapse; table-layout: fixed; }
  th { text-align: left; color: var(--text2); font-weight: 400; padding: 6px 8px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  td { padding: 7px 8px; border-bottom: 0.5px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; }
  .bg { background: var(--success-bg); color: var(--success-text); }
  .bw { background: var(--warn-bg); color: var(--warn-text); }
  .bd { background: var(--danger-bg); color: var(--danger-text); }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success-bg); color: var(--success-text); border: 0.5px solid var(--success-text); border-radius: var(--radius); padding: 8px 18px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
  .note { font-size: 11px; color: var(--text3); margin-top: 8px; padding: 0 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
  </div>
  <h1>My Peugeot 油耗儀表板</h1>
  <span id="hdr-date"></span>
</header>

<div class="container">

  <div class="filter-bar">
    <label>年份</label>
    <select id="yearFilter" onchange="applyFilter()"><option value="all">全部</option></select>
    <label>月份</label>
    <select id="monthFilter" onchange="applyFilter()"><option value="all">全部月份</option></select>
  </div>

  <div class="metrics">
    <div class="metric"><div class="lbl">加油次數</div><div class="val" id="m-count">—</div><div class="unit">次</div></div>
    <div class="metric"><div class="lbl">總加油量</div><div class="val" id="m-liters">—</div><div class="unit">公升</div></div>
    <div class="metric"><div class="lbl">平均油耗</div><div class="val" id="m-avg">—</div><div class="unit">km/L</div></div>
    <div class="metric"><div class="lbl">總加油費</div><div class="val" id="m-cost">—</div><div class="unit">TWD</div></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('trend')">趨勢圖表</div>
    <div class="tab" onclick="switchTab('add')">新增加油</div>
    <div class="tab" onclick="switchTab('list')">加油紀錄</div>
  </div>

  <div id="tab-trend" class="tab-content active">
    <div class="chart-row">
      <div class="chart-box">
        <div class="chart-title">每次實際油耗 (km/L)</div>
        <div style="position:relative;height:210px"><canvas id="effChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">每次加油金額 (TWD)</div>
        <div style="position:relative;height:210px"><canvas id="costChart"></canvas></div>
      </div>
    </div>
    <div class="chart-row">
      <div class="chart-box">
        <div class="chart-title">每次加油量 (L)</div>
        <div style="position:relative;height:190px"><canvas id="literChart"></canvas></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">每月加油費合計 (TWD)</div>
        <div style="position:relative;height:190px"><canvas id="monthChart"></canvas></div>
      </div>
    </div>
  </div>

  <div id="tab-add" class="tab-content">
    <div class="form-card">
      <h3>新增加油紀錄</h3>
      <div class="form-grid">
        <div class="field"><label>日期</label><input type="date" id="f-date"></div>
        <div class="field"><label>時間</label><input type="time" id="f-time" value="12:00"></div>
        <div class="field"><label>加油量（公升）</label><input type="number" id="f-liters" placeholder="例：38.5" step="0.001" min="0" oninput="calcFuel()"></div>
        <div class="field"><label>油價（TWD/L）</label><input type="number" id="f-price" placeholder="例：28.7" step="0.1" min="0" oninput="calcFuel()"></div>
        <div class="field"><label>當下里程（km）</label><input type="number" id="f-odo" placeholder="例：24050" min="0" oninput="calcFuel()"></div>
        <div class="field"><label>加油金額（TWD）</label><input type="number" id="f-amount" placeholder="自動計算，可覆蓋" step="1" oninput="amountManual=true"></div>
      </div>
      <div class="computed-row" id="computedRow">
        <div class="computed-item"><div class="cl">預計金額</div><div class="cv" id="c-amount">—</div></div>
        <div class="computed-item"><div class="cl">距上次加油</div><div class="cv" id="c-since">—</div></div>
        <div class="computed-item"><div class="cl">本次油耗</div><div class="cv" id="c-mpg">—</div></div>
      </div>
      <button class="btn-primary" onclick="addRecord()">儲存</button>
    </div>
  </div>

  <div id="tab-list" class="tab-content">
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th style="width:90px">日期</th>
          <th style="width:68px">加油(L)</th>
          <th style="width:64px">金額</th>
          <th style="width:74px">里程(km)</th>
          <th style="width:80px">距上次(km)</th>
          <th style="width:76px">油耗(km/L)</th>
          <th style="width:44px"></th>
        </tr></thead>
        <tbody id="fuelTable"></tbody>
      </table>
    </div>
    <p class="note">油耗依里程差與加油量自動計算；第一筆及里程異常者顯示「—」</p>
  </div>

</div>

<div id="toast" class="toast">已儲存</div>

<script>
const SEED = [
  ['2025-06-28', 45.000,     5, 1278],
  ['2025-07-01', 37.940,   480, 1070],
  ['2025-07-05', 39.904,   813, 1010],
  ['2025-07-08', 41.140,  1417, 1168],
  ['2025-07-14', 43.354,  1917, 1192],
  ['2025-07-23', 40.430,  2452, 1112],
  ['2025-07-27', 40.520,  2974, 1114],
  ['2025-08-02', 26.465,  3323,  670],
  ['2025-08-07', 38.450,  3825, 1068],
  ['2025-08-09', 40.890,  4439, 1169],
  ['2025-08-12', 33.730,  4971,  951],
  ['2025-08-16', 28.580,  5372,  729],
  ['2025-08-18', 35.050,  5900,  978],
  ['2025-08-23', 40.800,  6465, 1138],
  ['2025-08-28', 10.540,  6951,  304],
  ['2025-08-30',  6.040,  7051,  174],
  ['2025-08-30', 41.018,  7151, 1116],
  ['2025-09-03', 39.570,  7713, 1191],
  ['2025-09-08', 43.940,  8290, 1270],
  ['2025-09-13', 43.873,  8892, 1136],
  ['2025-09-17', 41.930,  9434, 1208],
  ['2025-09-24', 40.550, 10002, 1164],
  ['2025-10-01', 39.850, 10504, 1144],
  ['2025-10-06', 39.630, 10934, 1137],
  ['2025-10-17', 42.360, 11491, 1207],
  ['2025-10-24', 35.660, 12004,  998],
  ['2025-10-26', 28.260, 12468,  791],
  ['2025-10-29', 37.230, 13014, 1061],
  ['2025-11-03', 35.360, 13585, 1142],
  ['2025-11-08', 35.900, 14131, 1034],
  ['2025-11-15', 35.450, 14674, 1014],
  ['2025-11-22', 28.900, 15138,  827],
  ['2025-11-29', 36.840, 15718, 1054],
  ['2025-12-06', 34.500, 16259,  987],
  ['2025-12-14', 33.868, 16801,  972],
  ['2025-12-20', 35.931, 17423,  913],
  ['2025-12-28', 33.370, 17938,  931],
  ['2026-01-03', 23.570, 18270,  667],
  ['2026-01-11', 38.480, 18901, 1051],
  ['2026-01-24', 37.670, 19444, 1051],
  ['2026-01-31', 37.140, 20052, 1062],
  ['2026-02-07', 36.418, 20611,  947],
  ['2026-02-15', 44.700, 21292, 1283],
  ['2026-02-23', 46.230, 21895, 1327],
  ['2026-03-02', 36.490, 22412, 1055],
  ['2026-03-08', 36.100, 22983, 1043],
  ['2026-03-20', 41.070, 23605, 1207],
  ['2026-03-22', 17.510, 23904,  532],
];

const LS_KEY = 'peugeot_fuel_v2';
let userRecords = [];
try { userRecords = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch(e) {}
function saveUser() { try { localStorage.setItem(LS_KEY, JSON.stringify(userRecords)); } catch(e) {} }

function buildRecords() {
  const seed = SEED.map(([date, liters, odometer, amount]) => ({ date, liters, odometer, amount, fromSeed: true }));
  const all = [...seed, ...userRecords].sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return (a.odometer || 0) - (b.odometer || 0);
  });
  for (let i = 0; i < all.length; i++) {
    if (i === 0) { all[i].distSince = null; all[i].mpg = null; continue; }
    const prev = all[i - 1], cur = all[i];
    if (cur.odometer && prev.odometer && cur.odometer > prev.odometer) {
      cur.distSince = cur.odometer - prev.odometer;
      cur.mpg = cur.distSince / cur.liters;
    } else {
      cur.distSince = null; cur.mpg = null;
    }
  }
  return all;
}

const allYears = [...new Set(SEED.map(r => r[0].slice(0,4)))].sort();
const yearSel = document.getElementById('yearFilter');
allYears.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y+'年'; yearSel.appendChild(o); });
['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'].forEach((n,i) => {
  const o = document.createElement('option'); o.value = i+1; o.textContent = n;
  document.getElementById('monthFilter').appendChild(o);
});
const today = new Date();
document.getElementById('f-date').value = today.toISOString().slice(0,10);
document.getElementById('hdr-date').textContent = today.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric' });

const charts = {};
function dc(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function filteredRecords() {
  const yr = document.getElementById('yearFilter').value;
  const mo = document.getElementById('monthFilter').value;
  return buildRecords().filter(r =>
    (yr === 'all' || r.date.startsWith(yr)) &&
    (mo === 'all' || parseInt(r.date.slice(5,7)) == mo)
  );
}

function applyFilter() {
  const recs = filteredRecords();
  updateMetrics(recs);
  updateCharts(recs);
  updateTable(recs);
}

function updateMetrics(recs) {
  const totalL = recs.reduce((s,r) => s + r.liters, 0);
  const totalCost = recs.reduce((s,r) => s + r.amount, 0);
  const withMpg = recs.filter(r => r.mpg !== null);
  const avgMpg = withMpg.length ? withMpg.reduce((s,r) => s + r.mpg, 0) / withMpg.length : 0;
  document.getElementById('m-count').textContent = recs.length;
  document.getElementById('m-liters').textContent = totalL.toFixed(1);
  document.getElementById('m-avg').textContent = avgMpg > 0 ? avgMpg.toFixed(1) : '—';
  document.getElementById('m-cost').textContent = Math.round(totalCost).toLocaleString();
}

function updateCharts(recs) {
  const labels = recs.map(r => r.date.slice(5));
  const xOpts = { autoSkip: true, maxRotation: 45, font: { size: 10 } };

  dc('effChart');
  charts['effChart'] = new Chart(document.getElementById('effChart'), {
    type: 'line',
    data: { labels, datasets: [{ data: recs.map(r => r.mpg !== null ? +r.mpg.toFixed(2) : null), borderColor: '#1D9E75', backgroundColor: 'rgba(29,158,117,0.08)', fill: true, tension: 0.3, pointRadius: 3, spanGaps: false }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{ ticks:{ font:{size:11}, callback: v => v+'km/L' } }, x:{ ticks:xOpts } } }
  });

  dc('costChart');
  charts['costChart'] = new Chart(document.getElementById('costChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: recs.map(r => r.amount), backgroundColor: 'rgba(186,117,23,0.65)', borderRadius: 3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{ ticks:{ font:{size:11}, callback: v => '$'+v } }, x:{ ticks:xOpts } } }
  });

  dc('literChart');
  charts['literChart'] = new Chart(document.getElementById('literChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: recs.map(r => r.liters), backgroundColor: 'rgba(55,138,221,0.6)', borderRadius: 3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{ ticks:{ font:{size:11}, callback: v => v+'L' } }, x:{ ticks:xOpts } } }
  });

  const monthMap = {};
  recs.forEach(r => { const k = r.date.slice(0,7); monthMap[k] = (monthMap[k] || 0) + r.amount; });
  const mEntries = Object.entries(monthMap).sort((a,b) => a[0].localeCompare(b[0]));
  dc('monthChart');
  charts['monthChart'] = new Chart(document.getElementById('monthChart'), {
    type: 'bar',
    data: { labels: mEntries.map(([k]) => k.slice(2)), datasets: [{ data: mEntries.map(([,v]) => Math.round(v)), backgroundColor: 'rgba(127,119,221,0.65)', borderRadius: 3 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ y:{ ticks:{ font:{size:11}, callback: v => '$'+v } }, x:{ ticks:{ autoSkip:false, maxRotation:45, font:{size:10} } } } }
  });
}

function updateTable(recs) {
  const sorted = [...recs].sort((a,b) => b.date.localeCompare(a.date));
  document.getElementById('fuelTable').innerHTML = sorted.map(r => {
    const mpgBadge = r.mpg !== null
      ? (r.mpg >= 13 ? `<span class="badge bg">${r.mpg.toFixed(1)}</span>`
        : r.mpg >= 10 ? `<span class="badge bw">${r.mpg.toFixed(1)}</span>`
        : `<span class="badge bd">${r.mpg.toFixed(1)}</span>`)
      : '<span style="color:var(--text3)">—</span>';
    const delBtn = r.fromSeed ? '' : `<button class="btn-del" onclick="delRecord('${r.date}',${r.liters})">刪</button>`;
    return `<tr>
      <td>${r.date}</td>
      <td>${r.liters.toFixed(3)}</td>
      <td>$${r.amount}</td>
      <td>${r.odometer ? r.odometer.toLocaleString() : '—'}</td>
      <td>${r.distSince !== null ? r.distSince.toLocaleString() : '—'}</td>
      <td>${mpgBadge}</td>
      <td>${delBtn}</td>
    </tr>`;
  }).join('');
}

let amountManual = false;
function calcFuel() {
  amountManual = false;
  const l   = parseFloat(document.getElementById('f-liters').value);
  const p   = parseFloat(document.getElementById('f-price').value);
  const odo = parseFloat(document.getElementById('f-odo').value);
  const row = document.getElementById('computedRow');
  if (!isNaN(l) && !isNaN(p)) {
    row.style.display = 'flex';
    const amt = l * p;
    document.getElementById('c-amount').textContent = '$' + Math.round(amt);
    if (!amountManual) document.getElementById('f-amount').value = Math.round(amt);
    const allRecs = buildRecords().filter(r => r.odometer);
    const lastOdo = allRecs.length ? allRecs[allRecs.length - 1].odometer : null;
    if (lastOdo && !isNaN(odo) && odo > lastOdo) {
      const diff = odo - lastOdo;
      document.getElementById('c-since').textContent = diff.toLocaleString() + ' km';
      document.getElementById('c-mpg').textContent   = (diff / l).toFixed(1) + ' km/L';
    } else {
      document.getElementById('c-since').textContent = '—';
      document.getElementById('c-mpg').textContent   = '—';
    }
  } else { row.style.display = 'none'; }
}

function addRecord() {
  const date   = document.getElementById('f-date').value;
  const liters = parseFloat(document.getElementById('f-liters').value);
  const price  = parseFloat(document.getElementById('f-price').value);
  const odo    = parseFloat(document.getElementById('f-odo').value);
  const amtF   = parseFloat(document.getElementById('f-amount').value);
  if (!date || isNaN(liters) || isNaN(price)) { alert('請填寫日期、加油量和油價'); return; }
  const amount = isNaN(amtF) ? Math.round(liters * price) : amtF;
  userRecords.push({ date, liters, odometer: isNaN(odo) ? null : odo, amount });
  saveUser();
  ['f-liters','f-price','f-odo','f-amount'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('computedRow').style.display = 'none';
  amountManual = false;
  applyFilter();
  showToast();
  switchTab('list');
}

function delRecord(date, liters) {
  if (!confirm('確定刪除這筆紀錄？')) return;
  const idx = userRecords.findIndex(r => r.date === date && r.liters === liters);
  if (idx > -1) { userRecords.splice(idx, 1); saveUser(); applyFilter(); }
}

function switchTab(name) {
  const names = ['trend','add','list'];
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', names[i] === name));
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function showToast() {
  const t = document.getElementById('toast');
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 1800);
}

applyFilter();
</script>
</body>
</html>
